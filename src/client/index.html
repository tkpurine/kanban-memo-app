<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Memo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icons/icon.svg">
</head>
<body>
  <!-- Login modal -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Login</h2>
      <p>Enter the password to access Kanban Memo.</p>
      <input type="password" id="login-input" placeholder="Password">
      <button id="login-submit">Login</button>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <!-- Folder config modal -->
  <div id="folder-modal" class="modal-overlay">
    <div class="modal-content">
      <h2>Set Storage Folder</h2>
      <p>Enter the path to a local folder where session data will be saved.</p>
      <input type="text" id="folder-input" placeholder="/path/to/storage">
      <button id="folder-submit">OK</button>
      <p id="folder-error" class="error"></p>
    </div>
  </div>

  <!-- Task detail modal -->
  <div id="task-modal" class="modal-overlay hidden">
    <div class="modal-content task-modal-content">
      <div class="task-modal-header">
        <h2>Edit Task</h2>
        <button id="task-modal-close" class="task-modal-close-btn">&times;</button>
      </div>
      <textarea id="task-modal-content" rows="4" placeholder="Task content..."></textarea>
      <div class="task-modal-field">
        <label for="task-modal-status">Status</label>
        <select id="task-modal-status">
          <option value="todo">Todo</option>
          <option value="in_progress">In Progress</option>
          <option value="waiting">Waiting</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="task-modal-field">
        <label>Tags</label>
        <div id="task-modal-tags"></div>
        <select id="task-modal-tag-add">
          <option value="">+ Add tag...</option>
        </select>
      </div>
      <div class="task-modal-actions">
        <button id="task-modal-save" class="btn-primary">Save</button>
        <button id="task-modal-delete" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <!-- Top bar -->
    <header id="top-bar">
      <button id="new-session-btn">+ New Session</button>
      <span id="session-time"></span>
      <div id="view-toggle">
        <button id="kanban-view-btn" class="view-btn active">Board</button>
        <button id="list-view-btn" class="view-btn">List</button>
      </div>
    </header>

    <!-- Task input -->
    <div id="task-input-area">
      <input type="text" id="task-input" placeholder="Enter new task...">
      <button id="add-task-btn">Add</button>
    </div>

    <!-- Mobile column tabs (visible on mobile only) -->
    <div id="column-tabs" class="column-tabs">
      <button class="column-tab active" data-status="todo">Todo</button>
      <button class="column-tab" data-status="in_progress">In Progress</button>
      <button class="column-tab" data-status="waiting">Waiting</button>
      <button class="column-tab" data-status="done">Done</button>
    </div>

    <!-- Board + Sidebar -->
    <div id="main-content">
      <div id="board">
        <div class="column" data-status="todo">
          <h3>Todo</h3>
          <div class="task-list"></div>
        </div>
        <div class="column" data-status="in_progress">
          <h3>In Progress</h3>
          <div class="task-list"></div>
        </div>
        <div class="column" data-status="waiting">
          <h3>Waiting</h3>
          <div class="task-list"></div>
        </div>
        <div class="column" data-status="done">
          <h3>Done</h3>
          <div class="task-list"></div>
        </div>
      </div>

      <div id="list-view" class="hidden">
        <div id="list-task-list"></div>
      </div>

      <aside id="tag-sidebar">
        <h3>Tags</h3>
        <div id="tag-list"></div>
        <div id="tag-input-area">
          <input type="text" id="tag-input" placeholder="New tag...">
          <button id="add-tag-btn">+ Add</button>
        </div>
      </aside>
    </div>

    <!-- Tag toggle button (mobile only) -->
    <button id="tag-toggle-btn" class="tag-toggle-btn">Tags</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
