app = 'kanban-memo-app'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'kanban_data'
  destination = '/data'

[env]
  NODE_ENV = 'production'
  STORAGE_FOLDER = '/data/kanban'
  PORT = '3000'
